# Production stack — images from GHCR only (no local build).
# Requires application files on the host (clone/checkout); Dockerfile does not bake app code.
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

networks:
  mynet:

services:
  web:
    image: ${CLOUDLOG_IMAGE_REGISTRY:-ghcr.io/magicbug}/cloudlog-web:${CLOUDLOG_IMAGE_TAG:-latest}
    env_file:
      - .env
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:rw
    command: ["/usr/local/bin/startup.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mynet
    restart: unless-stopped

  db:
    image: ${CLOUDLOG_IMAGE_REGISTRY:-ghcr.io/magicbug}/cloudlog-db:${CLOUDLOG_IMAGE_TAG:-latest}
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mynet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

volumes:
  db_data: {}
