# Development stack — local code, optional local image build.
#   docker compose up -d
#   docker compose build && docker compose up -d   # without registry images
#
# Production: use docker-compose.prod.yml

networks:
  mynet:

services:
  web:
    image: ghcr.io/magicbug/cloudlog-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:rw
    command: ["/usr/local/bin/startup.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mynet
    restart: on-failure

  db:
    image: ghcr.io/magicbug/cloudlog-db:latest
    build:
      context: .
      dockerfile: Dockerfile-db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mynet
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

volumes:
  db_data: {}
